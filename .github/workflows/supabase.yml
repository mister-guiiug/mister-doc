name: Déploiement Supabase (Edge Functions + migrations)

# Déploie la base et les Edge Functions Supabase.
#
# Déclenché AUTOMATIQUEMENT quand un fichier `supabase/**` change sur `main`
# (filtre `paths` ci-dessous) et manuellement via « Run workflow ». Un push qui
# ne touche que le front NE redéploie donc PAS la base.
#
# ⚠️ ORDRE IMPOSÉ (cf. migration 0018) : les Edge Functions sont déployées AVANT
# les migrations, en étapes séquentielles du même job. La nouvelle fonction
# `calendar` compare les tokens par hash ; 0018 efface ensuite le clair. Inverser
# l'ordre casserait les abonnements .ics existants.
#
# Secrets requis (Settings → Secrets and variables → Actions → New secret) :
#   SUPABASE_ACCESS_TOKEN  Personal Access Token Supabase DÉDIÉ à la CI
#                          (Account → Access Tokens → Generate new token).
#                          NE PAS réutiliser le token de provisionnement `sbp_…`
#                          (celui-ci reste à révoquer).
#   SUPABASE_DB_URL        URI de connexion « Session pooler » (IPv4). Dashboard →
#                          Project Settings → Database → onglet « Session pooler »,
#                          format URI. ⚠️ Le mot de passe DOIT être URL-encodé s'il
#                          contient des caractères spéciaux (£ ( ] + / @ : …), sinon
#                          libpq découpe mal l'URI. Le plus sûr : un mot de passe
#                          alphanumérique. PAS la connexion directe db.<ref>.supabase.co
#                          (IPv6, injoignable depuis un runner GitHub).

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase.yml'
  workflow_dispatch:

# Un seul déploiement à la fois ; on N'ANNULE PAS un déploiement en cours :
# une migration ne doit jamais être interrompue en plein vol.
concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Ref publique du projet (déjà présente dans l'URL de l'app / le bundle).
      SUPABASE_PROJECT_REF: lgbuytinzukaxrqjwxme
      # N'applique QUE les migrations de préfixe numérique >= ce seuil. 0001→0013
      # ont été posées hors CLI (dont la suppression destructive S3 de 0009) et ne
      # doivent JAMAIS être rejouées sur la base réelle.
      MIN_MIGRATION: '14'
    steps:
      - uses: actions/checkout@v4

      # --- 1) Edge Functions AVANT les migrations (0018 en dépend) ---------------
      # setup-cli installe le CLI via npm → exige Node 20+. ubuntu-latest en fournit
      # un, mais on l'épingle pour éviter toute surprise d'image.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: supabase/setup-cli@v1
        with:
          # Version FIXE (publiée sur npm). `latest` fait résoudre la version via
          # l'API GitHub NON authentifiée → « rate limit exceeded » sur l'IP
          # partagée des runners (constaté). Une version épinglée évite cet appel.
          version: 2.109.1

      - name: Déployer les Edge Functions (calendar + push)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        # `verify_jwt = false` est déclaré PAR fonction dans supabase/config.toml.
        # `--use-api` : bundling côté serveur, pas besoin de Docker sur le runner.
        run: |
          supabase functions deploy \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --use-api

      # --- 2) Migrations 0014→dernière, en UNE transaction atomique -------------
      - name: S'assurer que psql est disponible
        run: psql --version || { sudo apt-get update && sudo apt-get install -y postgresql-client; }

      - name: Appliquer les migrations Supabase (psql, tout ou rien)
        env:
          # URI « Session pooler » (IPv4). ⚠️ Le mot de passe doit être URL-encodé
          # s'il a des caractères spéciaux (£ ( ] + / @ : …), sinon libpq découpe mal
          # l'URI (« could not translate host name »). Le plus sûr : mot de passe
          # alphanumérique (Dashboard → Database → Reset database password).
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require   # Supabase exige TLS
        run: |
          set -euo pipefail
          cd supabase/migrations
          # Zéro-padding => l'ordre lexical == l'ordre numérique. On ne garde que
          # les fichiers `NNNN_*.sql` de préfixe >= MIN_MIGRATION.
          mapfile -t files < <(ls *.sql | sort | awk -F_ -v min="$MIN_MIGRATION" '{ if (($1 + 0) >= min) print }')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "Aucune migration >= $MIN_MIGRATION à appliquer."
            exit 0
          fi
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::Secret SUPABASE_DB_URL manquant."
            exit 1
          fi
          # Garde : refuser la connexion DIRECTE (db.<ref>.supabase.co), en IPv6 donc
          # injoignable par le runner. Exiger le Session pooler (*.pooler.supabase.com,
          # IPv4). Message clair plutôt qu'un « Network is unreachable » cryptique.
          db_host=$(printf '%s' "$SUPABASE_DB_URL" | sed -E 's#^[a-zA-Z]+://[^@]*@([^:/?]+).*#\1#')
          if printf '%s' "$db_host" | grep -Eq '^db\.[a-z0-9]+\.supabase\.co$'; then
            echo "::error::SUPABASE_DB_URL pointe vers la connexion DIRECTE ($db_host), en IPv6 et injoignable par le runner GitHub. Utilisez l'URI du « Session pooler » : hôte *.pooler.supabase.com, utilisateur postgres.<ref>, port 5432."
            exit 1
          fi
          echo "Migrations appliquées (une seule transaction, tout ou rien) :"
          printf '  - %s\n' "${files[@]}"
          args=()
          for f in "${files[@]}"; do args+=(-f "$f"); done
          psql "$SUPABASE_DB_URL" --single-transaction -v ON_ERROR_STOP=1 "${args[@]}"
          echo "✅ Migrations appliquées."
