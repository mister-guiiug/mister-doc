<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!--
      La Content-Security-Policy (défense en profondeur) est injectée par
      vite.config.ts (plugin `csp`) : en PROD, `script-src` n'autorise que
      'self' + le hash SHA-256 du script anti-FOUC ci-dessous (pas de
      'unsafe-inline'). En DEV, 'unsafe-inline' est conservé pour le préambule
      Fast Refresh inline de @vitejs/plugin-react.
    -->

    <!-- Anti-FOUC : applique le thème avant le premier rendu. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem('mister-doc:theme');
          var eff =
            v === 'light' || v === 'dark'
              ? v
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = eff;
          document.documentElement.style.colorScheme = eff;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f766e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="mister-doc" />
    <meta
      name="description"
      content="Synchronisation du planning de gardes des médecins d'un hôpital : vue mensuelle des créneaux, numéro de semaine, compteurs week-end et heures."
    />
    <title>mister-doc — Planning de gardes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
